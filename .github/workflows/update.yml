name: Update timetable ICS

on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug connectivity
        run: |
          echo "Testing mainDBI endpoint..."
          curl -4 -v --connect-timeout 20 \
            'https://jarvekyla.edupage.org/rpr/server/maindbi.js?__func=mainDBIAccessor' || true

          echo "Testing holidays page..."
          curl -4 -I https://jarvekyla.edu.ee/vaheajad/ || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python generate_ics.py

      - name: Commit updated ICS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 3b.ics
          git diff --cached --quiet || git commit -m "Update timetable ICS"
          git push
